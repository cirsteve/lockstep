# 0G Galileo testnet config — storage is real, all other adapters are Mock.
# Day 4+ enables the real storage path; Day 3 ships the adapter as a
# constructable skeleton that raises NotImplementedError on method calls.
#
# Required env vars when running against this config:
#   LOCKSTEP_0G_PRIVATE_KEY       — dev wallet private key (faucet at faucet.0g.ai)
#   LOCKSTEP_0G_STORAGE_SERVICE_URL — URL of the local TS storage service
#                                     (e.g. http://localhost:7878), Day 4+
#
# Optional env overrides for the YAML defaults below:
#   LOCKSTEP_0G_GALILEO_RPC, LOCKSTEP_0G_GALILEO_INDEXER

storage:
  kind: real
  real:
    rpc_url: https://evmrpc-testnet.0g.ai
    indexer_url: https://indexer-storage-testnet-turbo.0g.ai
    token_budget: "100"
    log_path: logs/substrate-storage.jsonl
